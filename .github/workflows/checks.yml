name: checks
on: { workflow_dispatch, push }
jobs:
  checks:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compare:
          - 'nixosConfigurations.{minimal,postgresql}'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix run . path:./test#${{ matrix.compare }}
