name: checks
on: { workflow_dispatch, push }
env:
  FORCE_COLOR: 1
  RUN: nix --quiet run . -- --quiet
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: $RUN .#nixosConfigurations.{base,hello}
  run-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix run github:kwbauson/configdiff github:kwbauson/configdiff?dir=test#nixosConfigurations.{base,postgresql}
  run-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compare:
          - 'nixosConfigurations.{base,postgresql}'
          - 'nixosConfigurations.{base,home-manager}'
          - 'homeConfigurations.{base,git}'
          - 'darwinConfigurations.{base,dnsmasq}'
          - 'nixvimConfigurations.{base,ty}'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: $RUN .?dir=test#${{ matrix.compare }}
  run-override:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: |
          $RUN .?dir=test#nixosConfigurations.base{,} -- \
            --override-input old/nixpkgs nixpkgs/nixos-25.11 --override-input new/nixpkgs nixpkgs/nixos-26.05

