name: checks
on: { workflow_dispatch, push }
env:
  PAGER: cat
  FORCE_COLOR: 1
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix run . .#nixosConfigurations.{base,hello}
  run-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix run github:kwbauson/configdiff github:kwbauson/configdiff?dir=test#nixosConfigurations.{base,postgresql}
  run-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        compare:
          - 'nixosConfigurations.{base,postgresql}'
          - 'nixosConfigurations.{base,home-manager}'
          - 'homeConfigurations.{base,git}'
          - 'darwinConfigurations.{base,dnsmasq}'
          - 'nixvimConfigurations.{base,ty}'
          - "nixosConfigurations.base --new-module '{ services.postgresql.enable = true; }'"
        include:
          - os: macos-latest
            compare: 'nixosConfigurations.{base,postgresql}'
          - os: macos-latest
            compare: 'darwinConfigurations.{base,dnsmasq}'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix run . -- --dump dump.txt .?dir=test#${{ matrix.compare }}
      - run: nix run . -- --use-dump dump.txt
  run-override:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: |
          nix --quiet run . -- --quiet .?dir=test#nixosConfigurations.base{,} -- \
            --override-input old/nixpkgs nixpkgs/nixos-25.11 --override-input new/nixpkgs nixpkgs/nixos-26.05

