name: checks
on: { workflow_dispatch, push }
env:
  PAGER: cat
  FORCE_COLOR: 1
jobs:
  check:
    strategy:
      matrix:
        include:
          # flake tests
          - flake: nixosConfigurations.{base,postgresql}
          - flake: darwinConfigurations.{base,dnsmasq}
          - flake: darwinConfigurations.base --new-module '{ programs.git.enable = true; }'
          - flake: nixosConfigurations.{base,postgresql}
            os: macos-latest

          # impure tests
          - impure: 'nixos/configuration.nix --new-module "{ services.postgresql.enable = true; }"'

    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7
      - uses: nixbuild/nix-quick-install-action@v35
      - run: nix build
      - run: echo ./result/bin >> $GITHUB_PATH
      - if: ${{ matrix.flake }}
        run: configdiff .?dir=test#${{ matrix.flake }}
      - if: ${{ matrix.impure }}
        run: configdiff test/${{ matrix.impure }}

